services:
  db:
    image: mariadb:10.6
    container_name: telecom-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - telecom-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10

  midpoint:
    image: evolveum/midpoint:${MIDPOINT_VERSION}
    container_name: telecom-midpoint
    ports:
      - "8080:8080"
    environment:
      MIDPOINT_REPOSITORY_TYPE: mysql
      MIDPOINT_REPOSITORY_HOST: db
      MIDPOINT_REPOSITORY_PORT: 3306
      MIDPOINT_REPOSITORY_DATABASE: ${MYSQL_DATABASE}
      MIDPOINT_REPOSITORY_USERNAME: ${MYSQL_USER}
      MIDPOINT_REPOSITORY_PASSWORD: ${MYSQL_PASSWORD}
      MIDPOINT_REPOSITORY_URL: "jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      MIDPOINT_JDBC_DRIVER: org.mariadb.jdbc.Driver
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - midpoint_home:/opt/midpoint/var
      - ./midpoint/resources:/opt/midpoint/var/import
    networks:
      - telecom-net
    restart: unless-stopped

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
      args:
        ASTERISK_VERSION: ${ASTERISK_VERSION}
    container_name: telecom-asterisk
    network_mode: "host"
    volumes:
      - ./asterisk/configs:/etc/asterisk
      - asterisk_logs:/var/log/asterisk
      - asterisk_data:/var/lib/asterisk
    depends_on:
      - midpoint
    restart: unless-stopped

volumes:
  db_data:
  midpoint_home:
  asterisk_logs:
  asterisk_data:

networks:
  telecom-net:
    driver: bridge